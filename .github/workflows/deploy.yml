name: Deploy to EC2

# 触发条件：每次 push 到 main 分支
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest   # GitHub 提供的免费 Linux 虚拟机

    steps:
      # Step 1: 把代码拉下来（标准步骤，几乎每个 workflow 都有）
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 把 SSH 私钥写进虚拟机，这样才能 SSH 进你的 EC2
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/caseflow-key.pem
          chmod 600 ~/.ssh/caseflow-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Step 3: SSH 进 EC2，拉最新代码，重建并重启容器
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/caseflow-key.pem ubuntu@${{ secrets.EC2_HOST }} \
            "cd CaseFlow-MB && \
             git pull origin main && \
             docker compose -f docker-compose.prod.yml up --build -d backend frontend"
